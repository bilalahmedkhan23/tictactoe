<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --x-color: #ff6b6b;
      --o-color: #4ecdc4;
      --bg: #fff9f0;
      --card: #ffffff;
      --shadow: rgba(0,0,0,0.12);
      --text: #2d2d2d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 20%, #ffe0e0 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #d0f5f3 0%, transparent 50%);
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 24px;
      font-weight: 700;
    }

    /* Score Board */
    .scoreboard {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .score-box {
      background: var(--card);
      border-radius: 16px;
      padding: 12px 24px;
      text-align: center;
      box-shadow: 0 4px 16px var(--shadow);
      min-width: 90px;
      transition: transform 0.2s;
    }

    .score-box.active { transform: scale(1.08); }

    .score-box .label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
    }

    .score-box .player-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
    }

    .score-box.x-box .player-name { color: var(--x-color); }
    .score-box.o-box .player-name { color: var(--o-color); }

    .score-box .score-num {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      line-height: 1;
    }

    .score-box.x-box .score-num { color: var(--x-color); }
    .score-box.o-box .score-num { color: var(--o-color); }

    .score-box.tie-box .player-name,
    .score-box.tie-box .score-num { color: #bbb; }

    /* Status */
    .status {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      margin-bottom: 18px;
      min-height: 2rem;
      color: var(--text);
      text-align: center;
      transition: all 0.3s;
    }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .cell {
      width: clamp(80px, 22vw, 110px);
      height: clamp(80px, 22vw, 110px);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 4px 16px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .cell:hover:not(.taken) {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .cell:active:not(.taken) { transform: scale(0.97); }

    .cell.taken { cursor: default; }

    .cell .mark {
      display: inline-block;
      animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cell.x-cell .mark { color: var(--x-color); }
    .cell.o-cell .mark { color: var(--o-color); }

    .cell.winner-cell {
      animation: winPulse 0.6s ease forwards;
    }

    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes winPulse {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(255,215,0,0.4); }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1); background: #fffae0; }
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px var(--shadow); }
    .btn:active { transform: scale(0.97); }

    .btn-play {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white;
    }

    .btn-reset {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
    }

    /* Win overlay */
    .win-banner {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .win-banner.show {
      opacity: 1;
      pointer-events: all;
    }

    .win-card {
      background: white;
      border-radius: 28px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .win-emoji { font-size: 4rem; margin-bottom: 8px; }

    .win-text {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 24px;
    }

    .win-text span.x-color { color: var(--x-color); }
    .win-text span.o-color { color: var(--o-color); }
  </style>
</head>
<body>

  <h1>Tic Tac Toe 🎮</h1>
  <p class="subtitle">2 Players — Take turns!</p>

  <div class="scoreboard">
    <div class="score-box x-box" id="xBox">
      <div class="label">Player 1</div>
      <div class="player-name">X</div>
      <div class="score-num" id="xScore">0</div>
    </div>
    <div class="score-box tie-box">
      <div class="label">Draws</div>
      <div class="player-name">—</div>
      <div class="score-num" id="tieScore">0</div>
    </div>
    <div class="score-box o-box" id="oBox">
      <div class="label">Player 2</div>
      <div class="player-name">O</div>
      <div class="score-num" id="oScore">0</div>
    </div>
  </div>

  <div class="status" id="status">Player X goes first! 🚀</div>

  <div class="board" id="board">
    <div class="cell" data-i="0" onclick="handleClick(0)"></div>
    <div class="cell" data-i="1" onclick="handleClick(1)"></div>
    <div class="cell" data-i="2" onclick="handleClick(2)"></div>
    <div class="cell" data-i="3" onclick="handleClick(3)"></div>
    <div class="cell" data-i="4" onclick="handleClick(4)"></div>
    <div class="cell" data-i="5" onclick="handleClick(5)"></div>
    <div class="cell" data-i="6" onclick="handleClick(6)"></div>
    <div class="cell" data-i="7" onclick="handleClick(7)"></div>
    <div class="cell" data-i="8" onclick="handleClick(8)"></div>
  </div>

  <div class="buttons">
    <button class="btn btn-play" onclick="newGame()">New Game 🎲</button>
    <button class="btn btn-reset" onclick="resetAll()">Reset Scores 🔄</button>
  </div>

  <!-- Win Banner -->
  <div class="win-banner" id="winBanner">
    <div class="win-card">
      <div class="win-emoji" id="winEmoji">🏆</div>
      <div class="win-text" id="winText">Player X wins!</div>
      <button class="btn btn-play" onclick="closeAndNext()">Play Again!</button>
    </div>
  </div>

  <script>
    // ── Game State ──────────────────────────────────────────────
    let board       = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver    = false;
    let scores      = { X: 0, O: 0, tie: 0 };

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]           // diagonals
    ];

    // ── Handle a cell click ─────────────────────────────────────
    function handleClick(i) {
      if (gameOver || board[i]) return;

      board[i] = currentPlayer;
      renderCell(i);

      const winLine = checkWin();
      if (winLine) {
        highlightWin(winLine);
        scores[currentPlayer]++;
        updateScores();
        gameOver = true;
        setTimeout(() => showBanner(currentPlayer + ' wins! 🥳', currentPlayer === 'X' ? '🔴' : '🟢'), 500);
        document.getElementById('status').textContent = '';
      } else if (board.every(c => c)) {
        scores.tie++;
        updateScores();
        gameOver = true;
        setTimeout(() => showBanner("It's a Draw! 🤝", '🤝'), 400);
        document.getElementById('status').textContent = '';
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateStatus();
        updateActiveBox();
      }
    }

    // ── Render one cell ─────────────────────────────────────────
    function renderCell(i) {
      const cell = document.querySelector(`[data-i="${i}"]`);
      cell.innerHTML = `<span class="mark">${board[i]}</span>`;
      cell.classList.add('taken', board[i] === 'X' ? 'x-cell' : 'o-cell');
    }

    // ── Check for winner, return winning indices or null ────────
    function checkWin() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return line;
        }
      }
      return null;
    }

    // ── Highlight winning cells ─────────────────────────────────
    function highlightWin(line) {
      line.forEach(i => {
        document.querySelector(`[data-i="${i}"]`).classList.add('winner-cell');
      });
    }

    // ── UI Updates ──────────────────────────────────────────────
    function updateStatus() {
      const emoji = currentPlayer === 'X' ? '🔴' : '🟢';
      document.getElementById('status').textContent = `${emoji} Player ${currentPlayer}'s turn`;
    }

    function updateActiveBox() {
      document.getElementById('xBox').classList.toggle('active', currentPlayer === 'X');
      document.getElementById('oBox').classList.toggle('active', currentPlayer === 'O');
    }

    function updateScores() {
      document.getElementById('xScore').textContent = scores.X;
      document.getElementById('oScore').textContent = scores.O;
      document.getElementById('tieScore').textContent = scores.tie;
    }

    // ── Banner ──────────────────────────────────────────────────
    function showBanner(text, emoji) {
      document.getElementById('winEmoji').textContent = emoji;
      document.getElementById('winText').innerHTML = text;
      document.getElementById('winBanner').classList.add('show');
    }

    function closeAndNext() {
      document.getElementById('winBanner').classList.remove('show');
      newGame();
    }

    // ── New game (keep scores) ──────────────────────────────────
    function newGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.innerHTML = '';
        c.className = 'cell';
      });
      updateStatus();
      updateActiveBox();
    }

    // ── Reset everything ────────────────────────────────────────
    function resetAll() {
      scores = { X: 0, O: 0, tie: 0 };
      updateScores();
      newGame();
    }

    // init
    updateActiveBox();
  </script>
</body>
</html>
